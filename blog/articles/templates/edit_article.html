{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование | Django блог</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
            :root {
    --bg-body: #e6f4ff;        /* небесно-голубой фон */
    --bg-header: white;
    --header-text: #1e40af;     /* насыщенный синий */
    --card-bg: white;
    --card-text: #1e293b;
    --meta-color: #3b82f6;
    --border-color: #b9d4ff;
    --button-bg: #3b82f6;       /* синяя кнопка */
    --button-hover: #2563eb;
    --button-text: white;
    --pagination-bg: white;
    --pagination-text: #1e40af;
    --footer-text: #1e40af;
}
body.dark {
    --bg-body: #0f172a;         /* тёмно-синий фон */
    --bg-header: #1e293b;
    --header-text: #e2e8f0;
    --card-bg: #1e293b;
    --card-text: #f1f5f9;
    --meta-color: #94a3b8;
    --border-color: #334155;
    --button-bg: #1e40af;       /* тёмно-синяя кнопка */
    --button-hover: #1e3a8a;
    --button-text: white;
    --pagination-bg: #1e293b;
    --pagination-text: #e2e8f0;
    --footer-text: #94a3b8;
}
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-body);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .form-card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 2rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            color: var(--card-text);
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
            color: var(--button-bg);
        }
        input, textarea {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            font-size: 1rem;
            font-family: inherit;
            background: var(--card-bg);
            color: var(--card-text);
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--button-bg);
        }
        textarea {
            resize: vertical;
            min-height: 150px;
        }
        button {
            width: 100%;
            background: var(--button-bg);
            color: var(--button-text);
            border: none;
            padding: 0.7rem;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            background: var(--button-hover);
        }
        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: var(--button-bg);
            text-decoration: none;
            text-align: center;
            width: 100%;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .messages {
            margin-bottom: 1rem;
        }
        .alert {
            padding: 0.7rem;
            border-radius: 2rem;
            margin-bottom: 0.5rem;
        }
        .alert.success {
            background: #d1fae5;
            color: #065f46;
        }
        .alert.error {
            background: #fee2e2;
            color: #991b1b;
        }
        body.dark .alert.success {
            background: #2e5a3a;
            color: #d1fae5;
        }
        body.dark .alert.error {
            background: #5a3a3a;
            color: #fecaca;
        }
        .theme-toggle {
            background: var(--button-bg);
            border: none;
            border-radius: 2rem;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            color: var(--button-text);
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        .theme-toggle:hover {
            background: var(--button-hover);
        }
    </style>
</head>
<body>
    <div class="form-card">
        <div style="display: flex; justify-content: flex-end;">
            <button class="theme-toggle" id="theme-toggle"></button>
        </div>
        <h1>Редактировать статью</h1>
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert {{ message.tags }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="title">Название статьи</label>
                <input type="text" name="title" id="title" value="{{ post.title }}" required>
            </div>
            <div class="form-group">
                <label for="text">Текст статьи</label>
                <textarea name="text" id="text" rows="8" required>{{ post.text }}</textarea>
            </div>
            <button type="submit">Сохранить изменения</button>
        </form>
        <a href="{% url 'get_article' post.id %}" class="back-link">← Назад к статье</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('theme-toggle');
            const currentTheme = localStorage.getItem('theme') || 'light';
            if (currentTheme === 'dark') {
                document.body.classList.add('dark');
                themeToggle.textContent = 'light';
            } else {
                themeToggle.textContent = 'dark';
            }
            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                themeToggle.textContent = isDark ? 'light' : 'dark';
            });
        });
    </script>
</body>
</html>
